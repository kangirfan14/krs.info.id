<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="logoatas.png">
    <title>Arsip Berita Resmi - KRS.info</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #f8fafc;
            --text-dark: #0f172a;
            --blood-red: #8b0000;
            --blood-gradient: linear-gradient(135deg, #4a0404 0%, #8b0000 50%, #ee1d23 100%);
            --border-light: rgba(139, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text-dark); overflow-x: hidden; background-image: radial-gradient(rgba(139, 0, 0, 0.02) 1.5px, transparent 1.5px); background-size: 30px 30px; }

        /* --- NAVIGATION HEADER DENGAN LOGIKA SCROLL & KILAU --- */
        .navbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 92%;
            max-width: 1200px;
            height: 70px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-radius: 50px;
            border: 3px solid var(--blood-red);
            display: flex;
            align-items: center;
            padding: 0 30px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .navbar.scrolled {
            top: 0 !important;
            width: 100% !important;
            max-width: 100% !important;
            height: 65px;
            border-left: none !important;
            border-right: none !important;
            border-top: none !important;
            border-radius: 0px !important;
            background: #ffffff !important;
            padding: 0 40px !important;
        }
        .nav-container { display: flex; justify-content: space-between; align-items: center; width: 100%; }
        
        /* Animasi Kilau Logo */
        .nav-logo-link { display: flex; align-items: center; position: relative; overflow: hidden; border-radius: 8px; padding: 4px; }
        .nav-logo-img { height: 35px; width: auto; object-fit: contain; display: block; }
        .nav-logo-link::after {
            content: ''; position: absolute; top: 0; left: -150%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.6) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-25deg); animation: shineLogo 4s infinite ease-in-out;
        }
        @keyframes shineLogo { 0% { left: -150%; } 30%, 100% { left: 150%; } }

        .btn-back-beranda {
            display: inline-flex; align-items: center; gap: 8px; padding: 10px 22px;
            background: var(--blood-gradient); color: #ffffff !important; border-radius: 30px;
            text-decoration: none; font-weight: 800; font-size: 13px; text-transform: uppercase;
            box-shadow: 0 4px 15px rgba(139, 0, 0, 0.2); transition: all 0.3s ease;
        }
        .btn-back-beranda:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(139, 0, 0, 0.4); }

        /* --- HERO & COUNTER BERITA --- */
        .news-hero-section { padding: 140px 20px 20px; text-align: center; max-width: 800px; margin: 0 auto; }
        .news-hero-section h1 { font-family: "Syne", sans-serif; font-size: 2.8rem; font-weight: 900; color: #1a1a1a; letter-spacing: -1px; margin-bottom: 10px; }
        .news-hero-section h1 span { color: var(--blood-red); -webkit-text-stroke: 1px var(--blood-red); -webkit-text-fill-color: transparent; }
        
        .counter-box {
            display: inline-flex; align-items: center; gap: 8px; background: rgba(139, 0, 0, 0.06);
            padding: 8px 20px; border-radius: 30px; border: 1px solid var(--border-light);
            font-size: 0.9rem; font-weight: 700; color: var(--blood-red); margin-top: 5px;
        }

        /* --- NEWS PORTAL GRID & CARDS --- */
        .news-container { max-width: 900px; margin: 40px auto 100px; padding: 0 20px; }
        .news-card-professional {
            background: #ffffff; border: 3px solid var(--blood-red); border-radius: 24px;
            margin-bottom: 35px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.02);
            transition: all 0.3s ease;
        }
        .news-card-professional:hover { transform: translateY(-3px); box-shadow: 10px 10px 0px rgba(139, 0, 0, 0.08); }
        
        .news-img-wrapper { width: 100%; aspect-ratio: 16 / 7; overflow: hidden; border-bottom: 3px solid var(--blood-red); }
        .news-img-wrapper img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .news-card-professional:hover .news-img-wrapper img { transform: scale(1.03); }

        .news-body { padding: 30px; position: relative; }
        .news-badge-category {
            display: inline-block; padding: 4px 12px; background: var(--blood-red);
            color: #fff; font-size: 11px; font-weight: 800; border-radius: 6px;
            text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px;
        }
        .news-waktu-kejadian { display: flex; align-items: center; gap: 6px; color: #64748b; font-size: 0.85rem; font-weight: 600; margin-bottom: 12px; }
        .news-waktu-kejadian i { color: var(--blood-red); }
        
        .news-title { font-family: "Syne", sans-serif; font-size: 1.6rem; font-weight: 800; color: #1a1a1a; line-height: 1.3; margin-bottom: 15px; }
        .news-ringkasan { color: #475569; font-size: 1rem; line-height: 1.6; font-weight: 500; }

        /* --- SMOOTH ACCORDION KRONOLOGI --- */
        .news-kronologi-wrapper {
            max-height: 0; overflow: hidden; transition: max-height 0.5s cubic-bezier(0, 1, 0, 1);
            border-top: 1px dashed transparent; margin-top: 0; padding-top: 0;
        }
        .news-card-professional.expanded .news-kronologi-wrapper {
            max-height: 2000px; /* Nilai tampung tinggi tak terbatas */
            transition: max-height 0.8s cubic-bezier(1, 0, 1, 0);
            border-top: 1px dashed rgba(139, 0, 0, 0.2);
            margin-top: 20px; padding-top: 20px;
        }
        .news-kronologi-content { color: #334155; font-size: 0.98rem; line-height: 1.7; }
        .news-kronologi-content p { margin-bottom: 15px; text-align: justify; }

        /* --- BUTTON TOGGLE READ MORE --- */
        .btn-toggle-berita {
            display: inline-flex; align-items: center; gap: 8px; padding: 12px 28px;
            background: #ffffff; color: var(--blood-red); border: 2px solid var(--blood-red);
            border-radius: 50px; font-weight: 800; font-size: 0.85rem; cursor: pointer;
            text-transform: uppercase; margin-top: 20px; transition: all 0.3s ease; box-shadow: 0 4px 10px rgba(139,0,0,0.05);
        }
        .btn-toggle-berita:hover { background: var(--blood-red); color: #ffffff; transform: translateY(-1px); }

        /* --- RESPONSIVE MOBILE VIEW --- */
        @media (max-width: 768px) {
            .navbar { width: 95% !important; top: 10px !important; padding: 0 15px !important; height: 60px; }
            .navbar.scrolled { padding: 0 15px !important; }
            .nav-logo-img { height: 28px; }
            .btn-back-beranda { padding: 8px 16px; }
            .btn-back-beranda span { display: none; }
            
            .news-hero-section { padding: 110px 20px 10px; }
            .news-hero-section h1 { font-size: 2rem; }
            
            .news-body { padding: 20px; }
            .news-title { font-size: 1.25rem; }
            .news-img-wrapper { aspect-ratio: 16 / 9; }
            .btn-toggle-berita { width: 100%; justify-content: center; }
        }

        /* =======================================================
   KUNCIAN MATANG: EFEK KILAU LOGO BERITA (SINKRON SAKTI)
   ======================================================= */
.nav-logo-link {
    display: flex;
    align-items: center;
    position: relative; /* Pengunci jangkar cahaya */
    overflow: hidden;   /* Potong cahaya biar gak luber keluar dari area logo */
    border-radius: 8px; /* Tepi halus */
    padding: 4px;
}

.nav-logo-img {
    height: 35px; /* Ukuran pas ideal di Desktop */
    width: auto;
    object-fit: contain;
    display: block;
}

/* Generator Garis Pantulan Cahaya Kilau */
.nav-logo-link::after {
    content: '';
    position: absolute;
    top: 0;
    left: -150%; /* Start dari luar kiri logo */
    width: 50%;
    height: 100%;
    background: linear-gradient(
        to right, 
        rgba(255, 255, 255, 0) 0%, 
        rgba(255, 255, 255, 0.65) 50%, 
        rgba(255, 255, 255, 0) 100%
    );
    transform: skewX(-25deg); /* Bikin kemiringan kilau biar dinamis */
    animation: kilauBeritaLogo 4s infinite ease-in-out; /* Melesat tiap 4 detik sekali */
}

/* Timeline pergerakan kilau */
@keyframes kilauBeritaLogo {
    0% {
        left: -150%;
    }
    30%, 100% {
        left: 150%; /* Melesat keluar ke sisi kanan */
    }
}

/* Responsif Layar HP (Mobile) */
@media (max-width: 768px) {
    .nav-logo-img {
        height: 28px; /* Ukuran mini proporsional saat dibuka di HP */
    }
}
footer {
        padding: 50px 20px;
        text-align: center;
        font-size: 12px;
        color: #94a3b8;
        font-weight: 700;
      }
    </style>
</head>
<body>

    <header class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo-link">
                <img src="krs.png" alt="Logo" class="nav-logo-img">
            </a>
            <div class="nav-menu-right">
                <a href="index.html#Berita" class="btn-back-beranda">
                    <i class="fa-solid fa-house-chimney"></i> <span>Beranda</span>
                </a>
            </div>
        </div>
    </header>

    <section class="news-hero-section">
        <h1>Berita</h1>
        <div class="counter-box">
            <i class="fa-solid fa-newspaper"></i> Total: <span id="totalBeritaCount">0</span> Berita Terpublikasi
        </div>
    </section>

    <main class="news-container" id="indukContainerBerita"></main>

    <footer>&copy; 2026 KRS.INFO — #karangsarineweru</footer>

    <script src="berita-data.js"></script>
    <script>
        // Logika Mengatur Navbar Saat Di-scroll
        window.addEventListener('scroll', function() {
            const nav = document.querySelector('.navbar');
            if(window.scrollY > 20) { nav.classList.add('scrolled'); }
            else { nav.classList.remove('scrolled'); }
        });

        // Pemroses Utama Tampilan List Berita Berdasarkan Urutan Tanggal Rilis
        document.addEventListener("DOMContentLoaded", function() {
            const container = document.getElementById("indukContainerBerita");
            const counterText = document.getElementById("totalBeritaCount");

            // Tampilkan total hitungan real data berita
            counterText.textContent = DATABASE_BERITA.length;

            // Logika Mengurutkan Berita: Tanggal Rilis Terbaru ditaruh paling atas (Custom Date Order)
            const beritaTerurut = [...DATABASE_BERITA].sort((a, b) => new Date(b.tanggalRilis) - new Date(a.tanggalRilis));

            // Bersihkan isi container asal
            container.innerHTML = "";

            // Render masing-masing card secara dinamis
            beritaTerurut.forEach(berita => {
                const htmlCard = `
                    <article class="news-card-professional" id="news-block-${berita.id}">
                        <div class="news-img-wrapper">
                            <img src="${berita.gambar || 'default-news.jpg'}" alt="${berita.judul}">
                        </div>
                        <div class="news-body">
                            <span class="news-badge-category">${berita.kategori}</span>
                            <div class="news-waktu-kejadian">
                                <i class="fa-solid fa-calendar-day"></i> ${berita.waktuKejadian}
                            </div>
                            <h3 class="news-title">${berita.judul}</h3>
                            <p class="news-ringkasan">${berita.ringkasan}</p>
                            
                            <div class="news-kronologi-wrapper">
                                <div class="news-kronologi-content">
                                    ${berita.kronologi}
                                </div>
                            </div>

                            <button class="btn-toggle-berita" onclick="aksiToggleMajuMundur(this)">
                                <i class="fa-solid fa-book-open"></i> Baca Selengkapnya
                            </button>
                        </div>
                    </article>
                `;
                container.insertAdjacentHTML('beforeend', htmlCard);
            });
        });

        // Fungsi Animasi Buka Tutup Kronologi (Drop-Down & Drop-Up)
        function aksiToggleMajuMundur(btn) {
            const card = btn.closest('.news-card-professional');
            card.classList.toggle('expanded');
            
            if (card.classList.contains('expanded')) {
                btn.innerHTML = `<i class="fa-solid fa-book-bookmark"></i> Tutup Berita`;
                // Efek autoscroll halus ke posisi awal kartu jika dibuka di hp agar tidak kelewat membaca
                setTimeout(() => {
                    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 300);
            } else {
                btn.innerHTML = `<i class="fa-solid fa-book-open"></i> Baca Selengkapnya`;
            }
        }
    </script>
</body>
</html>
